       {text:'X có nhóm chức carbonyl.', ans:true}
     ]},
    {id:105, chapter:'hydrocarbon', text:'Hydrogen hóa alkene/alkyne (Ni, t°).',
     items:[
       {text:'Acetylene + H₂ (Lindlar) → ethane.', ans:false},
       {text:'Propylene + H₂ → propane.', ans:true},
       {text:'Isobutylene + H₂ → butane.', ans:false},
       {text:'But-1-ene và but-2-yne cộng H₂ dư cho cùng sản phẩm.', ans:true}
     ]},
    {id:106, chapter:'dx_alcohol_phenol', text:'Thí nghiệm thủy phân bromoethane.',
     items:[
       {text:'Có thể thay NaOH bằng KOH.', ans:true},
       {text:'HNO₃ để trung hòa kiềm dư.', ans:true},
       {text:'Bước 1 dùng AgNO₃ kiểm tra ion Br⁻.', ans:true},
       {text:'Kết tủa cuối cùng là AgBr màu trắng.', ans:true}
     ]},
    {id:107, chapter:'dx_alcohol_phenol', text:'Picric acid từ phenol + HNO₃.',
     items:[
       {text:'Phản ứng chứng minh ảnh hưởng -OH lên vòng benzen.', ans:true},
       {text:'Picric acid là chất rắn màu trắng.', ans:false},
       {text:'Picric acid có tính acid mạnh hơn phenol.', ans:true},
       {text:'Picric acid dùng làm thuốc nổ, thuộc da.', ans:true}
     ]},
    {id:108, chapter:'carbonyl_acid', text:'Phát biểu về aldehyde/ketone.',
     items:[
       {text:'Aldehyde vừa có tính oxi hóa vừa có tính khử.', ans:true},
       {text:'Ketone phản ứng với Tollens.', ans:false},
       {text:'Tất cả aldehyde, ketone đều có phản ứng iodoform.', ans:false},
       {text:'Bôi giấm khi bị côn trùng cắn.', ans:false}
     ]}
  ];

  const allShort = [
    {q:'Cho CH≡C–CH₂OH tác dụng với: Cu(OH)₂; AgNO₃/NH₃; H₂ (Ni,t°); Na; nước bromine; KMnO₄; NaOH. Có bao nhiêu phản ứng?', a:'5 (trừ NaOH).'},
    {q:'Số đồng phân alcohol C₃H₈O?', a:'2 (propan-1-ol, propan-2-ol).'},
    {q:'X + Ca → muối C₄H₄O₄Ca. CTCT X?', a:'HOOC-CH=CH-COOH.'},
    {q:'Điều chế 33.6L C₂H₂ (đktc) cần m gam đất đèn (80% CaC₂). m = ?', a:'120g.'},
    {q:'Trung hòa 0.005 mol citric acid (C₆H₈O₇) cần V mL NaOH 0.4M. V = ?', a:'37.5 mL.'},
    {q:'Số chất tác dụng I₂/NaOH tạo iodoform: CH₃CH₂CHO, CH₃COCH₃, CH₃CH₂CH₂OH, CH₃COOH.', a:'2 (CH₃COCH₃ và CH₃CH₂CHO).'},
    {q:'Trung hòa 40mL giấm (D=1g/mL) cần 25mL NaOH 1M. Nồng độ %?', a:'3.75%.'},
    {q:'Oxi hóa ethylene → ethanal. Dẫn 2.479L X (đkc) qua AgNO₃/NH₃ dư thu 16.2g Ag. H%?', a:'75%.'},
    {q:'6.72g acid X + 200g dd NaOH 2.24%. Tìm M(X)?', a:'60 (CH₃COOH).'},
    {q:'Chuẩn độ 6mL acetic acid bằng NaOH 0.15M (V TB = 19.97mL). Nồng độ mol?', a:'0.5M.'},
    {q:'Lên men 5L ethanol 9.2° (D=0.8) H=80% thu m g acid?', a:'384g.'},
    {q:'Bình gas 12kg (propane:butane=1:2 mol). Nhiệt tỏa ra?', a:'597600 kJ, dùng được ~47.8 ngày.'},
    {q:'Cho 4.6g alcohol no đơn chức X + Na dư → 1.2395 L H₂ (đkc). X là?', a:'C₂H₅OH (ethanol).'},
    {q:'Tính M của acid: 6.72g acid + 200g dd NaOH 2.24% vừa đủ.', a:'60 (CH₃COOH).'}
  ];

  // ==================== STATE & LOGIC ====================
  let currentView = 'review';
  let currentChapter = 'all';
  let filteredQuestions = { mcq:[], tf:[], short:[] };

  function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
  function filterByChapter(arr, ch) { return ch === 'all' ? arr : arr.filter(i => i.chapter === ch); }

  function getRandomExam() {
    let mcqPool = filterByChapter(allMCQ, currentChapter);
    let tfPool = filterByChapter(allTF, currentChapter);
    let shortPool = filterByChapter(allShort, currentChapter);
    if (mcqPool.length < 18) mcqPool = shuffle([...allMCQ]);
    if (tfPool.length < 4) tfPool = shuffle([...allTF]);
    if (shortPool.length < 6) shortPool = shuffle([...allShort]);

    const mcq = shuffle(mcqPool).slice(0, 18).map(q => {
      if (q.lock) return { ...q };
      const opts = [...q.opts];
      const correctIndex = q.ans;
      const indices = [0,1,2,3];
      const shuffledIndices = shuffle(indices);
      const newOpts = shuffledIndices.map(i => opts[i]);
      const newAns = shuffledIndices.indexOf(correctIndex);
      return { ...q, opts: newOpts, ans: newAns };
    });

    return { mcq, tf: shuffle(tfPool).slice(0, 4), short: shuffle(shortPool).slice(0, 6) };
  }

  const dynamicContent = document.getElementById('dynamicContent');
  const actionBar = document.getElementById('actionBar');
  const resultBox = document.getElementById('resultBox');

  function renderReview() {
    const data = getRandomExam();
    filteredQuestions = data;
    resultBox.classList.remove('show');
    let html = '';
    data.mcq.forEach((q,i) => {
      html += `<div class="card" data-qid="${q.id}" data-type="mcq">
        <div class="q-header"><span class="q-num">Câu ${i+1}</span><span class="q-text">${q.q}</span></div>
        <ul class="options-list">${q.opts.map((opt,oi) => `<li class="option-item" data-opt="${oi}"><input type="radio" name="r_mcq_${q.id}" value="${oi}">${opt}</li>`).join('')}</ul>
        ${q.exp ? `<p class="exp" style="color:#2e7d32;display:none;">💡 ${q.exp}</p>` : ''}</div>`;
    });
    data.tf.forEach((q,i) => {
      html += `<div class="card" data-qid="${q.id}" data-type="tf">
        <div class="q-header"><span class="q-num">Câu ${i+1}</span><span class="q-text">${q.text}</span></div>
        <div class="tf-group">${q.items.map((it,ii) => `<div class="tf-row" data-item="${ii}"><span class="tf-label">${String.fromCharCode(97+ii)})</span><span>${it.text}</span><div class="tf-btns"><button class="tf-true-btn" data-val="true">Đúng</button><button class="tf-false-btn" data-val="false">Sai</button></div></div>`).join('')}</div></div>`;
    });
    data.short.forEach((q,i) => {
      html += `<div class="card" data-type="short"><div class="q-header"><span class="q-num">Câu ${i+1}</span><span class="q-text">${q.q}</span></div><textarea placeholder="Nhập đáp án..." style="width:100%;min-height:50px;border-radius:8px;border:1px solid #f0c8d8;padding:8px;"></textarea><p class="exp" style="color:#2e7d32;display:none;">💡 ${q.a}</p></div>`;
    });
    dynamicContent.innerHTML = html;
    actionBar.innerHTML = `<button class="btn btn-pink" id="btnSubmit">📩 Nộp bài & Chấm điểm</button><button class="btn btn-outline" id="btnReset">🔄 Làm đề mới</button>`;
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll('.option-item').forEach(li => li.addEventListener('click', function(){
      const radio = this.querySelector('input'); radio.checked = true;
      this.parentElement.querySelectorAll('.option-item').forEach(s => s.classList.remove('selected'));
      this.classList.add('selected');
    }));
    document.querySelectorAll('.tf-true-btn, .tf-false-btn').forEach(btn => btn.addEventListener('click', function(){
      const row = this.closest('.tf-row'); const val = this.dataset.val;
      row.querySelectorAll('button').forEach(b => b.classList.remove('active-true','active-false'));
      if(val==='true') this.classList.add('active-true'); else this.classList.add('active-false');
    }));
    document.getElementById('btnSubmit')?.addEventListener('click', submitAndGrade);
    document.getElementById('btnReset')?.addEventListener('click', ()=>{ renderReview(); window.scrollTo(0,0); });
  }

  function submitAndGrade() {
    let score1=0, score2=0;
    document.querySelectorAll('.card[data-type="mcq"]').forEach(card => {
      const qid=+card.dataset.qid; const q=filteredQuestions.mcq.find(q=>q.id===qid);
      const radio=card.querySelector('input:checked');
      card.querySelectorAll('.option-item').forEach(li=>li.classList.remove('show-correct','show-wrong'));
      const correctLi=card.querySelector(`.option-item[data-opt="${q.ans}"]`);
      if(correctLi) correctLi.classList.add('show-correct');
      if(radio && +radio.value===q.ans) score1+=0.3;
      else if(radio) { const sel=card.querySelector(`.option-item[data-opt="${radio.value}"]`); if(sel) sel.classList.add('show-wrong'); }
      card.querySelectorAll('input').forEach(r=>r.disabled=true);
      card.querySelector('.exp') && (card.querySelector('.exp').style.display = 'block');
    });

    document.querySelectorAll('.card[data-type="tf"]').forEach(card => {
      const qid=+card.dataset.qid; const q=filteredQuestions.tf.find(q=>q.id===qid);
      let correct=0;
      card.querySelectorAll('.tf-row').forEach((row,ii)=>{
        const trueBtn=row.querySelector('.tf-true-btn'); const falseBtn=row.querySelector('.tf-false-btn');
        const userVal = trueBtn.classList.contains('active-true') ? 'true' : (falseBtn.classList.contains('active-false') ? 'false' : null);
        const correctVal = q.items[ii].ans ? 'true' : 'false';

        row.classList.remove('show-correct','show-user-wrong');
        // Luôn đánh dấu đáp án đúng
        if (correctVal === 'true') trueBtn.classList.add('active-true'); else falseBtn.classList.add('active-false');
        row.classList.add('show-correct'); // nền xanh

        if (userVal !== null && userVal !== correctVal) {
          row.classList.add('show-user-wrong'); // nền đỏ nếu user chọn sai
          row.classList.remove('show-correct');
        } else if (userVal === correctVal) {
          correct++;
        }
        trueBtn.disabled = falseBtn.disabled = true;
      });
      if(correct===4) score2+=0.5; else if(correct===3) score2+=0.25;
    });

    document.querySelectorAll('.card[data-type="short"] .exp').forEach(el => el.style.display = 'block');
    document.querySelectorAll('.card[data-type="short"] textarea').forEach(ta => ta.disabled = true);

    const total = score1+score2;
    document.getElementById('resultScore').textContent = total.toFixed(1);
    resultBox.classList.add('show');
    resultBox.scrollIntoView({behavior:'smooth'});
  }

  function renderKnowledge() {
    dynamicContent.innerHTML = `<div class="knowledge-box">
      <h2>📚 TỔNG HỢP KIẾN THỨC HÓA 11 HK2</h2>
      <p><em>Tổng hợp từ VnDoc, VietJack, VuiHoc, Loigiaihay – bám sát SGK Kết nối tri thức.</em></p>
      <h2>⛽ CHƯƠNG 4: HYDROCARBON</h2>
      <h3>1. ALKANE (CnH₂n+₂, n≥1)</h3>
      <p><b>Tính chất vật lý:</b> Nhẹ hơn nước, không tan trong nước. Nhiệt độ sôi tăng theo chiều tăng phân tử khối.</p>
      <p><b>Tính chất hóa học:</b> Phản ứng thế halogen (askt), cracking, phản ứng cháy: CnH₂n+₂ + (3n+1)/2 O₂ → nCO₂ + (n+1)H₂O.</p>
      <h3>2. ALKENE (CnH₂n, n≥2) VÀ ALKYNE (CnH₂n-₂, n≥2)</h3>
      <p><b>Tính chất hóa học:</b> Cộng H₂, Br₂, HX (Markovnikov). Trùng hợp. Alkyne đầu mạch + AgNO₃/NH₃ tạo kết tủa.</p>
      <p><b>Điều chế acetylene:</b> CaC₂ + 2H₂O → C₂H₂↑ + Ca(OH)₂.</p>
      <h3>3. ARENE (CnH₂n-₆, n≥6)</h3>
      <p><b>Danh pháp:</b> Tên gốc alkyl + benzene. Vị trí: ortho, meta, para.</p>
      <p><b>Tính chất hóa học:</b> Phản ứng thế (halogen hóa, nitro hóa), cộng H₂ khó. Quy tắc định hướng: nhóm alkyl định hướng ortho-para; nhóm -NO₂, -COOH định hướng meta. Oxi hóa nhánh alkyl bằng KMnO₄ tạo acid benzoic.</p>
      <h2>🧴 CHƯƠNG 5: DẪN XUẤT HALOGEN – ALCOHOL – PHENOL</h2>
      <h3>1. DẪN XUẤT HALOGEN</h3>
      <p>Phản ứng thế OH⁻, tách HX (Zaitsev).</p>
      <h3>2. ALCOHOL</h3>
      <p><b>Danh pháp:</b> Tên gốc-chức (alcohol + tên alkyl + ic) hoặc tên thay thế (hydrocarbon + ol).</p>
      <p><b>Tính chất:</b> Tác dụng Na, oxi hóa (bậc I → aldehyde, bậc II → ketone), tách nước tạo alkene. Polyalcohol + Cu(OH)₂ → xanh lam.</p>
      <h3>3. PHENOL</h3>
      <p>Tính acid yếu (NaOH, không đổi màu quỳ). Phản ứng thế Br₂ tạo 2,4,6-tribromophenol (trắng).</p>
      <h2>🍋 CHƯƠNG 6: HỢP CHẤT CARBONYL – CARBOXYLIC ACID</h2>
      <h3>1. ALDEHYDE & KETONE</h3>
      <p>Aldehyde tráng bạc, Cu(OH)₂/OH⁻. Ketone có iodoform (CH₃CO-). Khử bởi NaBH₄.</p>
      <h3>2. CARBOXYLIC ACID</h3>
      <p><b>Danh pháp:</b> Thông thường (formic, acetic, propionic…); thay thế (acid + hydrocarbon + oic).</p>
      <p><b>Tính chất:</b> Làm đỏ quỳ, tác dụng Na, NaOH, CaCO₃. Phản ứng ester hóa: RCOOH + R'OH ⇌ RCOOR' + H₂O (H₂SO₄ đặc, t°).</p>
    </div>`;
    actionBar.innerHTML = '';
  }

  function setView(view) {
    currentView = view;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab-btn[data-view="${view}"]`).classList.add('active');
    resultBox.classList.remove('show');
    if(view==='review') renderReview();
    else renderKnowledge();
  }

  document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', ()=> setView(btn.dataset.view)));
  document.querySelectorAll('.chip').forEach(chip => chip.addEventListener('click', function(){
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    this.classList.add('active'); currentChapter = this.dataset.chapter;
    if(currentView==='review') renderReview();
    else renderKnowledge();
  }));

  renderReview();
})();
</script>
