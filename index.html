        <p><em>Hydrocarbon là những hợp chất hữu cơ chỉ chứa C và H.</em></p>

        <h3>1. Alkane (CnH2n+2, n≥1)</h3>
        <ul>
          <li><b>Cấu tạo:</b> Chỉ có liên kết đơn C-C, C-H, mạch hở.</li>
          <li><b>Tính chất vật lí:</b> Nhẹ hơn nước, không tan trong nước, tan trong dung môi hữu cơ.</li>

          <li><b>Ứng dụng:</b> Nhiên liệu, dung môi, nguyên liệu tổng hợp hữu cơ.</li>
        </ul>

        <h3>2. Alkene (CnH2n, n≥2) và Alkyne (CnH2n-2, n≥2)</h3>
        <ul>
          <li><b>Alkene:</b> Có 1 liên kết đôi C=C. Phản ứng cộng (H₂, Br₂, HX), trùng hợp, oxi hóa bởi KMnO₄. <b>Quy tắc Markovnikov:</b> H cộng vào C có nhiều H hơn.</li>
          <li><b>Alkyne:</b> Có 1 liên kết ba C≡C. Tương tự alkene, thêm phản ứng thế ion kim loại (AgNO₃/NH₃) với alkyne đầu mạch tạo kết tủa.</li>
          <li><b>Điều chế acetylene:</b> CaC₂ + 2H₂O → C₂H₂↑ + Ca(OH)₂.</li>
        </ul>

        <h3>3. Arene (Hydrocarbon thơm) ⭐</h3>
        <p><b>Khái niệm:</b> Arene là hydrocarbon có <span class="highlight">một hay nhiều vòng benzene</span>. Benzene (C₆H₆) là arene đơn giản nhất. Dãy đồng đẳng của benzene có công thức chung <b>CnH2n-6 (n ≥ 6)</b>.</p>
        
        <h4>a. Cấu tạo và danh pháp</h4>
        <ul>
          <li><b>Benzene:</b> 6C tạo thành lục giác đều, tất cả nguyên tử nằm trên một mặt phẳng, góc liên kết 120°, độ dài liên kết C-C đều bằng 139 pm.</li>
          <li><b>Danh pháp:</b> Tên nhánh alkyl + benzene (vd: methylbenzene/toluene, vinylbenzene/styrene).</li>
          <li><b>Vị trí nhóm thế:</b> ortho (o-, 1,2), meta (m-, 1,3), para (p-, 1,4).</li>
          <li><b>Gốc aryl:</b> Phenyl (C₆H₅-), Benzyl (C₆H₅CH₂-).</li>
          <li>Các arene thường gặp: toluene (C₆H₅CH₃), xylene (C₆H₄(CH₃)₂), styrene (C₆H₅CH=CH₂), naphthalene (C₁₀H₈).</li>
        </ul>

        <h4>b. Tính chất vật lí</h4>
        <ul>
          <li>Benzene, toluene, styrene, xylene là chất lỏng không màu; naphthalene là chất rắn trắng.</li>
          <li>Không tan trong nước, nhẹ hơn nước, tan trong dung môi hữu cơ, có mùi đặc trưng, dễ cháy.</li>
          <li>Nhóm BTX (Benzene, Toluene, Xylene) có trong dầu mỏ và nhựa than đá.</li>
        </ul>

        <h4>c. Tính chất hóa học</h4>
        <p><b>Vòng benzene bền, khó tham gia phản ứng cộng, phản ứng đặc trưng là phản ứng thế.</b></p>
        <table>
          <tr><th>Loại phản ứng</th><th>Phương trình tiêu biểu</th><th>Điều kiện</th></tr>
          <tr>
            <td><b>Phản ứng thế Halogen</b></td>
            <td>C₆H₆ + Br₂ →(FeBr₃, t°) C₆H₅Br + HBr<br>C₆H₅CH₃ + Br₂ →(FeBr₃, t°) o-bromotoluene + p-bromotoluene</td>
            <td>Xúc tác FeCl₃/FeBr₃, nhiệt độ</td>
          </tr>
          <tr>
            <td><b>Phản ứng Nitro hóa</b></td>
            <td>C₆H₆ + HNO₃ →(H₂SO₄ đặc, 50°C) C₆H₅NO₂ + H₂O</td>
            <td>HNO₃ đặc, H₂SO₄ đặc, ≤50°C</td>
          </tr>
          <tr>
            <td><b>Phản ứng cộng H₂</b></td>
            <td>C₆H₆ + 3H₂ →(Ni, t° cao, áp suất) C₆H₁₂ (cyclohexane)</td>
            <td>Ni, t° cao, áp suất cao</td>
          </tr>
          <tr>
            <td><b>Oxi hóa nhánh alkyl</b></td>
            <td>C₆H₅CH₃ + 2KMnO₄ →(t°) C₆H₅COOK + 2MnO₂ + KOH + H₂O</td>
            <td>KMnO₄, đun nóng</td>
          </tr>
          <tr>
            <td><b>Phản ứng cháy</b></td>
            <td>C₆H₆ + 15/2 O₂ → 6CO₂ + 3H₂O</td>
            <td></td>
          </tr>
        </table>
        <p><b>Quy tắc thế vào vòng benzene:</b> Khi vòng benzene có sẵn nhóm thế loại I (alkyl, -OH, -NH₂), phản ứng thế ưu tiên vào vị trí <b>ortho và para</b>. Nhóm thế loại II (-COOH, -CHO, -NO₂) định hướng <b>meta</b>.</p>

        <h4>d. Ứng dụng và điều chế</h4>
        <ul>
          <li><b>Ứng dụng:</b> Sản xuất polymer (styrene→PS), dung môi, thuốc nhuộm, dược phẩm, chất tẩy rửa (LAS).</li>
          <li><b>Điều chế:</b> Chủ yếu từ dầu mỏ qua quá trình reforming.</li>
          <li><b>Lưu ý an toàn:</b> Arene (đặc biệt benzene) là chất độc, có khả năng gây ung thư, cần tuân thủ quy tắc an toàn khi sử dụng.</li>
        </ul>
      `,
      dx_alcohol_phenol: `
        <h2>🧴 Chương 5: Dẫn xuất Halogen - Alcohol - Phenol</h2>

        <h3>1. Dẫn xuất Halogen</h3>
        <ul>
          <li><b>Khái niệm:</b> Thay thế H của hydrocarbon bằng halogen (F, Cl, Br, I).</li>
          <li><b>Tính chất hóa học:</b>
            <ul>
              <li>Phản ứng thế với OH⁻: R-X + NaOH →(t°) R-OH + NaX.</li>
              <li>Phản ứng tách: R-CH₂-CH₂-X + KOH →(ethanol, t°) R-CH=CH₂ + KX + H₂O. <b>Quy tắc Zaitsev:</b> H ở C bậc cao hơn bị tách ưu tiên.</li>
            </ul>
          </li>
          <li><b>Ứng dụng:</b> Dung môi, thuốc trừ sâu, chất làm lạnh (CFC - gây thủng tầng ozone), thuốc gây tê (chloroethane).</li>
        </ul>

        <h3>2. Alcohol</h3>
        <ul>
          <li><b>Khái niệm:</b> Nhóm -OH liên kết với C no. Phân loại bậc I, II, III.</li>
          <li><b>Tính chất vật lí:</b> Alcohol có liên kết hydrogen liên phân tử → nhiệt độ sôi cao hơn hydrocarbon tương ứng. Tan tốt trong nước.</li>
          <li><b>Tính chất hóa học:</b>
            <ul>
              <li>Tác dụng với Na: 2ROH + 2Na → 2RONa + H₂↑.</li>
              <li>Oxi hóa: RCH₂OH + CuO →(t°) RCHO + Cu + H₂O (aldehyde); R₂CHOH + CuO →(t°) R₂C=O + Cu + H₂O (ketone).</li>
              <li>Phản ứng tách nước: Alcohol →(H₂SO₄ đặc, 170°C) alkene + H₂O.</li>
              <li>Polyalcohol (glycerol) hòa tan Cu(OH)₂ tạo dung dịch xanh lam đặc trưng.</li>
            </ul>
          </li>
          <li><b>Điều chế ethanol:</b> Lên men tinh bột hoặc hydrat hóa ethylene (C₂H₄ + H₂O →(H⁺, t°) C₂H₅OH).</li>
        </ul>

        <h3>3. Phenol</h3>
        <ul>
          <li><b>Cấu tạo:</b> Nhóm -OH gắn trực tiếp vào vòng benzene.</li>
          <li><b>Tính chất hóa học:</b>
            <ul>
              <li>Tính acid yếu (phenol): C₆H₅OH + NaOH → C₆H₅ONa + H₂O. Không làm đổi màu quỳ tím.</li>
              <li>Phản ứng thế vòng thơm: C₆H₅OH + 3Br₂ → C₆H₂Br₃OH↓ (trắng) + 3HBr.</li>
            </ul>
          </li>
          <li><b>Điều chế:</b> Từ cumene hoặc nhựa than đá.</li>
        </ul>
      `,
      carbonyl_acid: `
        <h2>🍋 Chương 6: Hợp chất Carbonyl - Carboxylic Acid</h2>

        <h3>1. Hợp chất Carbonyl (Aldehyde & Ketone)</h3>
        <ul>
          <li><b>Aldehyde (RCHO):</b> Có phản ứng tráng bạc (AgNO₃/NH₃), phản ứng với Cu(OH)₂/OH⁻ tạo kết tủa đỏ gạch Cu₂O.</li>
          <li><b>Ketone (RCOR'):</b> Không tráng bạc, nhưng có phản ứng iodoform (nhóm CH₃CO-).</li>
          <li><b>Phản ứng khử:</b> Aldehyde → alcohol bậc I; Ketone → alcohol bậc II (tác nhân NaBH₄, LiAlH₄).</li>
          <li><b>Formaldehyde (HCHO):</b> Dung dịch 37-40% gọi là formalin, dùng bảo quản mẫu, sản xuất nhựa.</li>
        </ul>

        <h3>2. Carboxylic Acid</h3>
        <ul>
          <li><b>Công thức chung:</b> R-COOH. Acid no, đơn chức, mạch hở: CnH2n+1COOH hay CmH2mO₂.</li>
          <li><b>Tính chất vật lí:</b> Có liên kết hydrogen liên phân tử → nhiệt độ sôi cao nhất trong các loại hợp chất hữu cơ cùng phân tử khối.</li>
          <li><b>Tính chất hóa học:</b>
            <ul>
              <li>Tính acid: Làm đỏ quỳ tím, tác dụng với kim loại, base, muối cacbonat. 2CH₃COOH + CaCO₃ → (CH₃COO)₂Ca + CO₂↑ + H₂O.</li>
              <li>Phản ứng ester hóa: RCOOH + R'OH ⇌(H₂SO₄ đặc, t°) RCOOR' + H₂O.</li>
            </ul>
          </li>
          <li><b>Acetic acid (CH₃COOH):</b> Thành phần giấm ăn (2-5%). Điều chế bằng lên men ethanol hoặc oxi hóa alkane.</li>
        </ul>
      `
    };

    // State
    let currentView = 'review';
    let currentChapter = 'all';
    let userAnswers = {};
    let filteredQuestions = [];
    let examTimer = null;
    let examTimeLeft = 45 * 60;
    let examSubmitted = false;

    const mainTabs = document.querySelectorAll('.main-tab');
    const chapterFilterContainer = document.getElementById('chapterFilterContainer');
    const chapterBtns = document.querySelectorAll('.chapter-btn');
    const dynamicContent = document.getElementById('dynamicContent');
    const actionBar = document.getElementById('actionBar');

    function filterQuestions() {
      if (currentChapter === 'all') {
        filteredQuestions = [...questionBank];
      } else {
        filteredQuestions = questionBank.filter(q => q.chapter === currentChapter);
      }
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function renderReview() {
      filterQuestions();
      if (filteredQuestions.length === 0) {
        dynamicContent.innerHTML = '<p>Không có câu hỏi cho chương này.</p>';
        return;
      }
      let html = '';
      filteredQuestions.forEach((q, idx) => {
        const selected = userAnswers[q.id] !== undefined ? userAnswers[q.id] : null;
        const showResult = selected !== null;
        html += `<div class="question-card" data-qid="${q.id}">`;
        html += `<div class="question-text">Câu ${idx+1}: ${q.q}</div><div class="options">`;
        q.opts.forEach((opt, optIdx) => {
          let cls = 'option';
          if (showResult && optIdx === q.ans) cls += ' correct';
          if (showResult && selected === optIdx && selected !== q.ans) cls += ' incorrect';
          if (selected === optIdx && !showResult) cls += ' selected';
          html += `<div class="${cls}" data-opt="${optIdx}">${opt}</div>`;
        });
        html += `</div>`;
        if (showResult && q.exp) html += `<div class="explanation">💡 ${q.exp}</div>`;
        html += `</div>`;
      });
      dynamicContent.innerHTML = html;
      actionBar.innerHTML = `<button class="btn outline" id="resetReviewBtn">🔄 Làm lại tất cả</button>`;
      document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', function(e) {
          if (currentView !== 'review') return;
          const card = this.closest('.question-card');
          const qid = parseInt(card.dataset.qid);
          const optIdx = parseInt(this.dataset.opt);
          if (userAnswers[qid] !== undefined) return;
          userAnswers[qid] = optIdx;
          renderReview();
        });
      });
      document.getElementById('resetReviewBtn')?.addEventListener('click', ()=>{
        userAnswers = {};
        renderReview();
      });
    }

    function startExam() {
      filterQuestions();
      if (filteredQuestions.length === 0) {
        alert('Không đủ câu hỏi.');
        return;
      }
      let examQ = shuffleArray([...filteredQuestions]);
      if (examQ.length > 18) examQ = examQ.slice(0, 18);
      filteredQuestions = examQ;
      userAnswers = {};
      examSubmitted = false;
      examTimeLeft = 45 * 60;
      renderExam();
      startTimer();
    }

    function renderExam() {
      let html = `<div class="timer" id="timerDisplay">⏳ ${formatTime(examTimeLeft)}</div>`;
      const answered = Object.keys(userAnswers).length;
      const total = filteredQuestions.length;
      html += `<div class="progress"><div class="progress-fill" style="width:${(answered/total)*100}%"></div></div>`;
      filteredQuestions.forEach((q, idx) => {
        const sel = userAnswers[q.id] !== undefined ? userAnswers[q.id] : null;
        html += `<div class="question-card" data-qid="${q.id}">`;
        html += `<div class="question-text">Câu ${idx+1}: ${q.q}</div><div class="options">`;
        q.opts.forEach((opt, optIdx) => {
          let cls = 'option';
          if (sel === optIdx) cls += ' selected';
          html += `<div class="${cls}" data-opt="${optIdx}">${opt}</div>`;
        });
        html += `</div></div>`;
      });
      dynamicContent.innerHTML = html;
      actionBar.innerHTML = `<button class="btn" id="submitExamBtn">📩 Nộp bài</button>`;
      document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', function(e) {
          if (examSubmitted) return;
          const card = this.closest('.question-card');
          const qid = parseInt(card.dataset.qid);
          const optIdx = parseInt(this.dataset.opt);
          userAnswers[qid] = optIdx;
          renderExam();
        });
      });
      document.getElementById('submitExamBtn')?.addEventListener('click', submitExam);
    }

    function formatTime(sec) {
      const m = Math.floor(sec/60);
      const s = sec%60;
      return `${m}:${s<10?'0':''}${s}`;
    }

    function startTimer() {
      if (examTimer) clearInterval(examTimer);
      examTimer = setInterval(() => {
        if (examSubmitted) { clearInterval(examTimer); return; }
        examTimeLeft--;
        const timerEl = document.getElementById('timerDisplay');
        if (timerEl) timerEl.innerText = `⏳ ${formatTime(examTimeLeft)}`;
        if (examTimeLeft <= 0) {
          clearInterval(examTimer);
          alert('Hết giờ!');
          submitExam();
        }
      }, 1000);
    }

    function submitExam() {
      if (examSubmitted) return;
      examSubmitted = true;
      clearInterval(examTimer);
      let correct = 0;
      filteredQuestions.forEach(q => { if (userAnswers[q.id] === q.ans) correct++; });
      const total = filteredQuestions.length;
      const score = (correct/total*10).toFixed(1);
      let html = `<div class="result-summary"><h3>📊 Kết quả</h3><p>✅ Đúng: <b>${correct}/${total}</b> — Điểm: <b>${score}/10</b></p></div>`;
      filteredQuestions.forEach((q, idx) => {
        const sel = userAnswers[q.id];
        html += `<div class="question-card"><div class="question-text">Câu ${idx+1}: ${q.q}</div><div class="options">`;
        q.opts.forEach((opt, optIdx) => {
          let cls = 'option';
          if (optIdx === q.ans) cls += ' correct';
          if (sel === optIdx && sel !== q.ans) cls += ' incorrect';
          html += `<div class="${cls}">${opt}</div>`;
        });
        html += `</div>`;
        if (q.exp) html += `<div class="explanation">💡 ${q.exp}</div>`;
        html += `</div>`;
      });
      dynamicContent.innerHTML = html;
      actionBar.innerHTML = `<button class="btn outline" id="retryExamBtn">🔄 Làm đề mới</button>`;
      document.getElementById('retryExamBtn')?.addEventListener('click', ()=>{
        userAnswers = {};
        examSubmitted = false;
        startExam();
      });
    }

    function renderKnowledge(chapter = 'all') {
      let html = '<div class="knowledge-content">';
      if (chapter === 'all' || chapter === 'hydrocarbon') html += knowledgeData.hydrocarbon;
      if (chapter === 'all' || chapter === 'dx_alcohol_phenol') html += knowledgeData.dx_alcohol_phenol;
      if (chapter === 'all' || chapter === 'carbonyl_acid') html += knowledgeData.carbonyl_acid;
      html += '</div>';
      dynamicContent.innerHTML = html;
      actionBar.innerHTML = '';
    }

    function setView(view) {
      currentView = view;
      mainTabs.forEach(t => t.classList.remove('active'));
      document.querySelector(`.main-tab[data-view="${view}"]`).classList.add('active');
      if (examTimer) { clearInterval(examTimer); examTimer = null; }
      userAnswers = {};
      examSubmitted = false;

      if (view === 'knowledge') {
        chapterFilterContainer.style.display = 'flex';
        renderKnowledge(currentChapter);
      } else {
        chapterFilterContainer.style.display = 'flex';
        if (view === 'review') renderReview();
        else startExam();
      }
    }

    mainTabs.forEach(tab => {
      tab.addEventListener('click', (e) => {
        const view = e.target.dataset.view;
        setView(view);
      });
    });

    chapterBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        chapterBtns.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentChapter = e.target.dataset.chapter;
        if (currentView === 'knowledge') {
          renderKnowledge(currentChapter);
        } else {
          userAnswers = {};
          if (examTimer) clearInterval(examTimer);
          if (currentView === 'review') renderReview();
          else startExam();
        }
      });
    });

    setView('review');
  })();
</script>
</body>
</html>
